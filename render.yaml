services:
  - type: web
    name: shl-assessment-recommender
    runtime: docker
    plan: free
    region: singapore
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: mock
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: CATALOG_PATH
        value: catalog/data/shl_catalog.json
      - key: VECTORSTORE_PATH
        value: vectorstore/faiss.index
      - key: VECTORSTORE_META_PATH
        value: vectorstore/metadata.json
      - key: RETRIEVAL_TOP_K
        value: "20"
      - key: RERANK_TOP_K
        value: "10"
      - key: MIN_RETRIEVAL_SCORE
        value: "0.25"
      - key: MAX_CONVERSATION_TURNS
        value: "8"
      - key: LOG_LEVEL
        value: INFO
